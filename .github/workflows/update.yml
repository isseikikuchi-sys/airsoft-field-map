name: Daily Sync + Update + Deploy

on:
  schedule:
    # 06:30 JST = 21:30 UTC (前日)
    - cron: '30 21 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '更新モード'
        type: choice
        options: [full, weather-only, sync-only]
        default: full

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync fields from spreadsheet
        env:
          FIELDS_CSV_URL: ${{ secrets.FIELDS_CSV_URL }}
        run: npm run sync

      - name: Run weather/schedule updater
        if: ${{ inputs.mode != 'sync-only' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: claude-sonnet-4-6
        run: |
          if [ "${{ inputs.mode }}" = "weather-only" ]; then
            npm run update:weather
          else
            npm run update
          fi

      - name: Commit synced data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fields.json data/updates.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes."
          else
            git commit -m "chore(data): sync $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build static site
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
